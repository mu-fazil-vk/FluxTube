name: Build and Sign APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # LANGKAH PENTING: Install Flutter di server GitHub
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get Flutter Dependencies
        run: flutter pub get

      - name: Decode Keystore
        run: |
          mkdir -p app
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > app/key.jks

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Build APK with Flutter
        # Pakai perintah flutter build supaya semua library otomatis ke-download
        run: flutter build apk --release
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: FluxTube-Release
          path: build/app/outputs/flutter-apk/*.apk
