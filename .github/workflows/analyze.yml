name: Flutter Analyze (VAR Check)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Prepare and Analyze
        # Digabung jadi satu biar robotnya nggak bingung urutan
        run: |
          flutter pub get
          flutter gen-l10n
          flutter analyze
