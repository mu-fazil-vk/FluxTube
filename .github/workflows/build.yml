name: Build FluxTube Android 📱

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Biar bisa di-klik manual tombol run-nya

jobs:
  build:
    name: Build APK Release
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout Code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Java (Wajib buat Android build)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Setup Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 4. Decode Keystore (Ini magic-nya!)
      # Kita ubah Base64 secret balik jadi file .jks
      - name: Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      # 5. Buat key.properties
      # Biar Gradle tau password & alias keystore-nya tanpa harus edit code
      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties

      # 6. Install Dependencies
      - name: Get Dependencies
        run: flutter pub get

      # 7. Build APK (Split per ABI biar file lebih kecil, atau hapus --split-per-abi kalau mau universal)
      - name: Build APK
        run: flutter build apk --release

      # 8. Upload Artifact (Biar bisa didownload hasil build-nya)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
