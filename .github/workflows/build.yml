name: Flutter CI - Build & Sign APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build Signed APK
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup Java
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'

      # Get Flutter dependencies
      - name: Install Dependencies
        run: flutter pub get

      # Run Flutter tests (optional)
      - name: Run Tests
        run: flutter test
        continue-on-error: true

      # Decode Keystore dari Base64
      - name: Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      # Create key.properties file
      - name: Create key.properties
        run: |
          cat > android/key.properties << EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      # Build APK
      - name: Build Signed APK
        run: flutter build apk --release

      # Build App Bundle (optional)
      - name: Build Signed App Bundle
        run: flutter build appbundle --release
        continue-on-error: true

      # Upload APK sebagai Artifact
      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      # Upload App Bundle sebagai Artifact (optional)
      - name: Upload Signed App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: build/app/outputs/bundle/release/app-release.aab
        continue-on-error: true

      # Create Release (optional - hanya untuk tag)
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```

## Langkah-langkah Setup

### 1. Siapkan File Keystore
Jika belum punya keystore, buat dengan perintah [3]:
```bash
keytool -genkey -v -keystore upload-keystore.jks -keyalg RSA -keysize 2048 -validity 10000 -alias upload
```

### 2. Konversi Keystore ke Base64
```bash
base64 upload-keystore.jks | tr -d '\n' > keystore_base64.txt
```

### 3. Tambahkan Secrets di GitHub
Buka repository → Settings → Secrets and variables → Actions → New repository secret [2]:

1. **ANDROID_KEYSTORE_BASE64**: Isi dengan konten dari `keystore_base64.txt`
2. **ANDROID_KEYSTORE_PASSWORD**: Password keystore Anda
3. **ANDROID_KEY_ALIAS**: Alias key (contoh: `upload`)
4. **ANDROID_KEY_PASSWORD**: Password key alias Anda

### 4. Modifikasi `android/app/build.gradle`
Tambahkan konfigurasi signing di file `android/app/build.gradle` [1][3]:

```gradle
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    ...
    
    signingConfigs {
        release {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword keystoreProperties['storePassword']
        }
    }
    
    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            shrinkResources true
        }
    }
}