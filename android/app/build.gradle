plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}
def releaseStoreFile = keystoreProperties['storeFile']
        ? file(keystoreProperties['storeFile'])
        : null
def hasReleaseKeystore = releaseStoreFile != null && releaseStoreFile.exists()

gradle.taskGraph.whenReady { taskGraph ->
    def buildingRelease = taskGraph.allTasks.any { task ->
        task.name.toLowerCase(Locale.ROOT).contains('release')
    }
    if (buildingRelease && !hasReleaseKeystore) {
        throw new IllegalStateException(
                "Release keystore is missing. Check android/key.properties storeFile; " +
                        "paths are resolved from android/app. For android/app/key.jks use storeFile=key.jks."
        )
    }
}

android {
    namespace "com.fazilvk.fluxtube"
    compileSdk flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    compileOptions {
        // Enable core library desugaring for NewPipe Extractor (requires Java 8+ APIs on older Android)
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.fazilvk.fluxtube"
        // You can update the following values to match your application needs.
        // For more information, see: https://docs.flutter.dev/deployment/android#reviewing-the-gradle-build-configuration.
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion 34
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true
    }   
    signingConfigs {
        release {
            if (hasReleaseKeystore) {
                storeFile releaseStoreFile
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storePassword keystoreProperties['storePassword']
            }
        }
    }

    buildFeatures {
        buildConfig = true
    }

    packaging {
        jniLibs {
            // Keep native libraries compressed in APKs. This keeps per-ABI release
            // artifacts small enough for stores with strict APK size limits.
            useLegacyPackaging = true
        }
    }

    buildTypes {
        release {
            if (hasReleaseKeystore) {
                signingConfig signingConfigs.release
            }
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    dependenciesInfo {
        // Disables dependency metadata when building APKs.
        includeInApk = false
        // Disables dependency metadata when building Android App Bundles.
        includeInBundle = false
    }

    lint {
        // Disable NullSafeMutableLiveData lint check that crashes with newer Kotlin/Gradle versions
        // This is a known issue with the androidx.lifecycle.lint detector
        disable "NullSafeMutableLiveData"
        // Don't abort build on lint errors (issues are in third-party plugins)
        abortOnError false
        checkReleaseBuilds false
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation platform("org.jetbrains.kotlin:kotlin-bom:2.1.0")

    // Core library desugaring for NewPipe Extractor (Java 8+ APIs on older Android)
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs_nio:2.1.3'

    // NewPipe Extractor - YouTube data extraction library (lowercase required for JitPack)
    implementation 'com.github.teamnewpipe:newpipeextractor:v0.26.1'

    // OkHttp - Required by NewPipe Extractor for HTTP requests
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'

    // Gson - JSON serialization for Flutter communication
    implementation 'com.google.code.gson:gson:2.11.0'

    // Kotlin Coroutines - Async operations for background extraction
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.1'

    // Media3 / ExoPlayer - native Android playback path for NewPipe streams
    def media3Version = '1.4.1'
    implementation "androidx.media3:media3-exoplayer:$media3Version"
    implementation "androidx.media3:media3-exoplayer-dash:$media3Version"
    implementation "androidx.media3:media3-exoplayer-hls:$media3Version"
    implementation "androidx.media3:media3-ui:$media3Version"
}
